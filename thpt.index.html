<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tra Cứu Điểm Chuẩn Đa Phương Thức</title>
  <style>
    /* CSS Trang trí giao diện */
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #f0f2f5;
      padding: 15px;
      margin: 0;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      max-width: 450px;
      margin: 20px auto;
    }
    h2 { text-align: center; color: #0056b3; margin-bottom: 20px; font-size: 22px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 6px; font-size: 14px; color: #444; }
    select, input {
      width: 100%; padding: 10px;
      border: 1px solid #ccc; border-radius: 6px;
      font-size: 16px; box-sizing: border-box;
    }
    .grid-diem {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    button {
      width: 100%; padding: 12px;
      background-color: #007bff; color: white;
      border: none; border-radius: 6px;
      font-size: 16px; font-weight: bold; cursor: pointer;
      margin-top: 10px;
    }
    button:hover { background-color: #0056b3; }
    .result-box {
      margin-top: 20px; padding: 15px;
      background: #e9ecef; border-radius: 8px;
      display: none;
    }
    .method-result {
      background: white; padding: 10px;
      border-radius: 6px; margin-top: 8px;
      border-left: 5px solid #6c757d;
    }
    .pass { border-left-color: #28a745; color: #28a745; font-weight: bold; }
    .fail { border-left-color: #dc3545; color: #dc3545; font-weight: bold; }
    .info-diem { font-size: 14px; color: #666; margin-top: 4px; }
  </style>
</head>
<body>

  <div class="container">
    <h2>Hệ Thống Tra Cứu Điểm Chuẩn</h2>
    
    <div class="form-group">
      <label>1. Chọn Trường Đại Học:</label>
      <select id="selectTruong" onchange="capNhatNganh()">
        <option value="">-- Chọn Trường --</option>
        <option value="BK">Đại học Bách Khoa</option>
        <option value="NEU">Đại học Kinh tế Quốc dân</option>
      </select>
    </div>

    <div class="form-group">
      <label>2. Chọn Ngành Học:</label>
      <select id="selectNganh">
        <option value="">-- Vui lòng chọn trường trước --</option>
      </select>
    </div>

    <div class="form-group">
      <label>3. Nhập điểm của bạn:</label>
      <div class="grid-diem">
        <div>
          <label style="font-weight:normal; font-size:12px;">Điểm THPT (Khối chính):</label>
          <input type="number" id="diemThpt" placeholder="Ví dụ: 25.5" step="0.1">
        </div>
        <div>
          <label style="font-weight:normal; font-size:12px;">Điểm Học Bạ:</label>
          <input type="number" id="diemHocBa" placeholder="Ví dụ: 27.0" step="0.1">
        </div>
        <div>
          <label style="font-weight:normal; font-size:12px;">ĐGNL ĐHQG (HSA):</label>
          <input type="number" id="diemHsa" placeholder="Thang 150. Ví dụ: 95">
        </div>
        <div>
          <label style="font-weight:normal; font-size:12px;">Quy đổi CC ngoại ngữ:</label>
          <input type="number" id="diemCcnn" placeholder="Thang 10. Ví dụ: 9.5" step="0.25">
        </div>
      </div>
    </div>
    
    <button onclick="checkKetQua()">Phân Tích Cơ Hội Trúng Tuyển</button>
    
    <div class="result-box" id="vungKetQua">
      <h3 style="margin-top:0; color:#333;" id="tieuDeKetQua">Kết quả tra cứu:</h3>
      <div id="chiTietKetQua"></div>
    </div>
  </div>

  <script>
    // Dữ liệu mẫu về các Trường, Ngành và Điểm chuẩn các năm trước
    const dataWeb = {
      "BK": {
        "IT1": {
          tenNganh: "Khoa học Máy tính (IT1)",
          thpt_2025: 28.5, thpt_2024: 28.2,
          hocba_2025: 29.0,
          hsa_2025: 105
        },
        "EE1": {
          tenNganh: "Kỹ thuật Điện (EE1)",
          thpt_2025: 25.0, thpt_2024: 24.5,
          hocba_2025: 26.5,
          hsa_2025: 85
        }
      },
      "NEU": {
        "TCNH": {
          tenNganh: "Tài chính - Ngân hàng",
          thpt_2025: 27.1, thpt_2024: 26.8,
          hocba_2025: 28.0,
          hsa_2025: 98
        },
        "LTM": {
          tenNganh: "Logistics & Quản lý chuỗi cung ứng",
          thpt_2025: 27.8, thpt_2024: 27.4,
          hocba_2025: 28.5,
          hsa_2025: 100
        }
      }
    };

    // Hàm tự động đổi danh sách Ngành khi chọn Trường
    function capNhatNganh() {
      const maTruong = document.getElementById("selectTruong").value;
      const selectNganh = document.getElementById("selectNganh");
      
      // Xóa các lựa chọn cũ
      selectNganh.innerHTML = '<option value="">-- Chọn Ngành --</option>';
      
      if (maTruong && dataWeb[maTruong]) {
        const danhSachNganh = dataWeb[maTruong];
        for (let maNganh in danhSachNganh) {
          let option = document.createElement("option");
          option.value = maNganh;
          option.text = danhSachNganh[maNganh].tenNganh;
          selectNganh.appendChild(option);
        }
      } else {
        selectNganh.innerHTML = '<option value="">-- Vui lòng chọn trường trước --</option>';
      }
    }

    // Hàm xử lý so sánh điểm khi bấm nút
    function checkKetQua() {
      const maTruong = document.getElementById("selectTruong").value;
      const maNganh = document.getElementById("selectNganh").value;
      
      if (!maTruong || !maNganh) {
        alert("Vui lòng chọn đầy đủ Trường và Ngành trước khi xem!");
        return;
      }

      // Lấy điểm người dùng nhập vào
      const dThpt = parseFloat(document.getElementById("diemThpt").value) || 0;
      const dHocBa = parseFloat(document.getElementById("diemHocBa").value) || 0;
      const dHsa = parseFloat(document.getElementById("diemHsa").value) || 0;
      const dCcnn = parseFloat(document.getElementById("diemCcnn").value) || 0;

      const nganhDuocChon = dataWeb[maTruong][maNganh];
      let htmlOutput = "";

      // 1. Xét phương thức THPT
      if(dThpt > 0) {
        let trangThai = (dThpt >= nganhDuocChon.thpt_2025) ? "pass" : "fail";
        let textTrangThai = (dThpt >= nganhDuocChon.thpt_2025) ? "Cơ hội ĐỖ cao (so với 2025)" : "Dưới điểm chuẩn 2025";
        htmlOutput += `
          <div class="method-result ${trangThai}">
            📌 Xét điểm thi THPT: ${textTrangThai}<br>
            <span class="info-diem">Điểm của bạn: ${dThpt} | Điểm chuẩn 2025: ${nganhDuocChon.thpt_2025} | Lịch sử 2024: ${nganhDuocChon.thpt_2024}</span>
          </div>`;
      }

      // 2. Xét phương thức Học Bạ
      if(dHocBa > 0) {
        let trangThai = (dHocBa >= nganhDuocChon.hocba_2025) ? "pass" : "fail";
        let textTrangThai = (dHocBa >= nganhDuocChon.hocba_2025) ? "Cơ hội ĐỖ cao" : "Dưới điểm chuẩn Học bạ";
        htmlOutput += `
          <div class="method-result ${trangThai}">
            📌 Xét Học Bạ: ${textTrangThai}<br>
            <span class="info-diem">Điểm của bạn: ${dHocBa} | Điểm chuẩn 2025: ${nganhDuocChon.hocba_2025}</span>
          </div>`;
      }

      // 3. Xét ĐGNL HSA
      if(dHsa > 0) {
        let trangThai = (dHsa >= nganhDuocChon.hsa_2025) ? "pass" : "fail";
        let textTrangThai = (dHsa >= nganhDuocChon.hsa_2025) ? "Cơ hội ĐỖ cao" : "Dưới điểm chuẩn HSA";
        htmlOutput += `
          <div class="method-result ${trangThai}">
            📌 Xét ĐGNL ĐHQG (HSA): ${textTrangThai}<br>
            <span class="info-diem">Điểm của bạn: ${dHsa} | Điểm chuẩn 2025: ${nganhDuocChon.hsa_2025}</span>
          </div>`;
      }
      
      // Nếu không nhập điểm nào
      if(dThpt === 0 && dHocBa === 0 && dHsa === 0) {
        htmlOutput = `<p style="color:#666;">Bạn chưa nhập loại điểm nào để đối chiếu. Hãy xem điểm chuẩn các năm của ngành này bên dưới:</p>
        <ul>
          <li>Điểm chuẩn THPT 2025: <b>${nganhDuocChon.thpt_2025}</b> (2024: ${nganhDuocChon.thpt_2024})</li>
          <li>Điểm chuẩn Học bạ 2025: <b>${nganhDuocChon.hocba_2025}</b></li>
          <li>Điểm chuẩn ĐGNL HSA 2025: <b>${nganhDuocChon.hsa_2025}</b></li>
        </ul>`;
      }

      document.getElementById("tieuDeKetQua").innerText = "Kết quả ngành: " + nganhDuocChon.tenNganh;
      document.getElementById("chiTietKetQua").innerHTML = htmlOutput;
      document.getElementById("vungKetQua").style.display = "block";
    }
  </script>
</body>
</html>
