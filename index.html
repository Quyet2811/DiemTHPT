<!DOCTYPE html>
<html>
<head>
  <style>
    /* Phần này là CSS để trang trí */
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f9;
      padding: 15px;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      max-width: 400px;
      margin: 0 auto;
    }
    h2 { text-align: center; color: #333; font-size: 20px; }
    .input-group { margin-bottom: 12px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
    input {
      width: 90%; padding: 10px;
      border: 1px solid #ddd; border-radius: 5px;
      font-size: 16px; /* Tránh bị phóng to màn hình trên iPhone */
    }
    button {
      width: 100%; padding: 12px;
      background-color: #28a745; color: white;
      border: none; border-radius: 5px;
      font-size: 16px; font-weight: bold; cursor: pointer;
    }
    .result-box {
      margin-top: 15px; padding: 15px;
      background: #e9ecef; border-radius: 5px;
    }
    .school { margin-bottom: 8px; font-size: 15px; }
    .pass { color: green; font-weight: bold; }
    .fail { color: red; font-weight: bold; }
  </style>
</head>
<body>

  <div class="container">
    <h2>Tra Cứu Đỗ Tốt Nghiệp & Đại Học</h2>
    
    <div class="input-group">
      <label>Điểm Toán:</label>
      <input type="number" id="toan" min="0" max="10" step="0.1" value="8">
    </div>
    <div class="input-group">
      <label>Điểm Văn:</label>
      <input type="number" id="van" min="0" max="10" step="0.1" value="7.5">
    </div>
    <div class="input-group">
      <label>Điểm Anh:</label>
      <input type="number" id="anh" min="0" max="10" step="0.1" value="8">
    </div>
    
    <button onclick="tinhDiem()">Xem Kết Quả</button>
    
    <div class="result-box" id="ketQua" style="display:none;">
      <h3>Tổng điểm khối A01 của bạn: <span id="tongDiem" style="color: blue;">0</span></h3>
      <hr>
      <div id="danhSachTruong"></div>
    </div>
  </div>

  <script>
    // Phần này là JavaScript để xử lý logic tính toán
    function tinhDiem() {
      // 1. Lấy điểm từ các ô nhập liệu
      let t = parseFloat(document.getElementById('toan').value) || 0;
      let v = parseFloat(document.getElementById('van').value) || 0;
      let a = parseFloat(document.getElementById('anh').value) || 0;
      
      // 2. Tính tổng điểm (Ví dụ khối A01: Toán + Văn + Anh)
      let tong = t + v + a;
      document.getElementById('tongDiem').innerText = tong.toFixed(2);
      
      // 3. Danh sách các trường dữ liệu mẫu (Tên trường và điểm chuẩn)
      let danhSachTruong = [
        { name: "Đại học Bách Khoa (Ngành A)", diemChuan: 24.5 },
        { name: "Đại học Kinh tế Quốc dân (Ngành B)", diemChuan: 27 },
        { name: "Đại học Công nghiệp (Ngành C)", diemChuan: 22 },
        { name: "Đại học Mở (Ngành D)", diemChuan: 18.0 }
      ];
      
      // 4. So sánh điểm và hiển thị kết quả
      let htmlKetQua = "";
      
      danhSachTruong.forEach(function(truong) {
        if (tong >= truong.diemChuan) {
          htmlKetQua += `<div class="school">🟢 ${truong.name}: <span class="pass">ĐỖ</span> (Điểm chuẩn: ${truong.diemChuan})</div>`;
        } else {
          htmlKetQua += `<div class="school">🔴 ${truong.name}: <span class="fail">TRƯỢT</span> (Điểm chuẩn: ${truong.diemChuan})</div>`;
        }
      });
      
      // 5. Hiển thị vùng kết quả ra màn hình
      document.getElementById('danhSachTruong').innerHTML = htmlKetQua;
      document.getElementById('ketQua').style.display = "block";
    }
  </script>

</body>
</html>
