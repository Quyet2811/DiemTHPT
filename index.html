<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tra Cứu Điểm Chuẩn Đại Học Thương Mại (TMU)</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #f4f6f9;
      padding: 15px;
      margin: 0;
      color: #333;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      max-width: 500px;
      margin: 10px auto;
    }
    h2 { text-align: center; color: #a31d24; margin-bottom: 20px; font-size: 22px; }
    h3 { color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 5px; margin-top: 25px; font-size: 18px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 6px; font-size: 14px; }
    .row-mon {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    select, input {
      width: 100%; padding: 10px;
      border: 1px solid #ccc; border-radius: 6px;
      font-size: 16px; box-sizing: border-box;
    }
    input:focus, select:focus { border-color: #a31d24; outline: none; }
    button {
      width: 100%; padding: 12px;
      background-color: #a31d24; color: white;
      border: none; border-radius: 6px;
      font-size: 16px; font-weight: bold; cursor: pointer;
      margin-top: 15px;
    }
    button:hover { background-color: #821318; }
    .result-box {
      margin-top: 20px; padding: 15px;
      background: #e9ecef; border-radius: 8px;
      display: none;
    }
    .khoi-item {
      background: white; padding: 10px;
      border-radius: 6px; margin-top: 8px;
      border-left: 5px solid #6c757d;
    }
    .pass { border-left-color: #28a745; }
    .fail { border-left-color: #dc3545; }
    .status-text { font-weight: bold; margin-bottom: 4px; }
    .status-text.pass { color: #28a745; }
    .status-text.fail { color: #dc3545; }
    .info-diem { font-size: 13px; color: #666; }
    .link-dean {
      background: #fff; padding: 12px;
      border-radius: 8px; margin-top: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      display: flex; justify-content: space-between; align-items: center;
    }
    .link-dean a { color: #a31d24; text-decoration: none; font-weight: bold; font-size: 14px; }
    .ccnn-grid {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Tra Cứu Điểm Chuẩn TMU</h2>
    
    <h3>Bước 1: Nhập điểm thi THPT của bạn</h3>
    <div class="form-group">
      <div class="row-mon">
        <input type="text" value="Toán (Bắt buộc)" disabled style="background:#e9ecef; font-weight:bold;">
        <input type="number" id="diemToan" placeholder="Điểm Toán" step="0.1" min="0" max="10">
      </div>
      <div class="row-mon">
        <input type="text" value="Ngữ Văn (Bắt buộc)" disabled style="background:#e9ecef; font-weight:bold;">
        <input type="number" id="diemVan" placeholder="Điểm Văn" step="0.1" min="0" max="10">
      </div>
    </div>

    <div class="form-group">
      <label>Chọn môn tự chọn 1 và điểm:</label>
      <div class="row-mon">
        <select id="monTc1">
          <option value="">-- Chọn môn --</option>
          <option value="LY">Vật Lí</option>
          <option value="HOA">Hóa Học</option>
          <option value="SINH">Sinh Học</option>
          <option value="SU">Lịch Sử</option>
          <option value="DIA">Địa Lí</option>
          <option value="ANH">Tiếng Anh</option>
          <option value="PHAP">Tiếng Pháp</option>
          <option value="TRUNG">Tiếng Trung</option>
        </select>
        <input type="number" id="diemTc1" placeholder="Điểm" step="0.1" min="0" max="10">
      </div>
    </div>

    <div class="form-group">
      <label>Chọn môn tự chọn 2 và điểm:</label>
      <div class="row-mon">
        <select id="monTc2">
          <option value="">-- Chọn môn --</option>
          <option value="LY">Vật Lí</option>
          <option value="HOA">Hóa Học</option>
          <option value="SINH">Sinh Học</option>
          <option value="SU">Lịch Sử</option>
          <option value="DIA">Địa Lí</option>
          <option value="ANH">Tiếng Anh</option>
          <option value="PHAP">Tiếng Pháp</option>
          <option value="TRUNG">Tiếng Trung</option>
        </select>
        <input type="number" id="diemTc2" placeholder="Điểm" step="0.1" min="0" max="10">
      </div>
    </div>

    <h3>Bước 2: Chọn Chứng chỉ ngoại ngữ (Nếu có)</h3>
    <div class="form-group ccnn-grid">
      <select id="ccnnLoai" onchange="doiHuongDanCCNN()">
        <option value="NONE">Không sử dụng</option>
        <option value="IELTS">IELTS Academic</option>
        <option value="TOEFL">TOEFL iBT</option>
        <option value="VSTEP">VSTEP</option>
        <option value="APTIS">APTIS ESOL</option>
        <option value="TOEIC">TOEIC 4 kỹ năng</option>
        <option value="HSK">HSK (Chỉ dùng cho ngành Trung)</option>
        <option value="TCF">TCF (Chỉ dùng cho ngành Pháp)</option>
        <option value="DELF">DELF (Chỉ dùng cho ngành Pháp)</option>
      </select>
      <input type="text" id="ccnnDiem" placeholder="Nhập điểm số / cấp độ">
    </div>
    <div id="huongDanCC" style="font-size: 12px; color: #a31d24; margin-top: -5px; margin-bottom: 10px; font-weight: 500;"></div>

    <h3>Bước 3: Chọn Nhóm ngành & Ngành tra cứu</h3>
    <div class="form-group">
      <label>Chọn Nhóm ngành:</label>
      <select id="selectNhomNganh" onchange="doiNhomNganh()">
        <option value="">-- Chọn nhóm ngành --</option>
        <option value="QUANTRI">Quản trị - Khách sạn - Du lịch</option>
        <option value="MARKETING">Marketing & Thương mại điện tử</option>
        <option value="KINHTE">Kinh tế & Kinh doanh quốc tế</option>
        <option value="KETOAN">Kế toán & Kiểm toán</option>
        <option value="LUAT">Luật kinh tế</option>
        <option value="NGONNGU">Ngôn ngữ thương mại</option>
        <option value="CONGNGHE">Hệ thống thông tin & Kinh tế số</option>
      </select>
    </div>

    <div class="form-group">
      <label>Chọn Ngành / CTĐT cụ thể tại TMU:</label>
      <select id="selectNganh">
        <option value="">-- Vui lòng chọn nhóm ngành trước --</option>
      </select>
    </div>

    <button onclick="analysisKetQua()">Phân Tích Cơ Hội Trúng Tuyển</button>

    <div class="result-box" id="vungKetQua">
      <h3 style="margin-top:0; color:#333;" id="tieuDeKetQua">Kết quả phân tích:</h3>
      <div id="chiTietKetQua"></div>
    </div>

    <div class="link-dean">
      <span>Trường Đại học Thương Mại (TMU)</span>
      <a href="https://tuyensinh.tmu.edu.vn/de-an-tuyen-sinh" target="_blank">Xem Đề Án Gốc ➔</a>
    </div>

  </div>

      },

      },

        "TM40": { ten: "Ngôn ngữ Trung Quốc (Tiếng Trung thương mại)", khoi: ["A01","D01","D07"], dc2025: 27.4 },

      },

        "TM39": { ten: "Kinh tế số (Phân tích kinh doanh trong môi trường số)", khoi: ["A00","A01","D01","D07"], dc2025: 25.1 }
      }
    };

    function doiHuongDanCCNN() {
      const loai = document.getElementById("ccnnLoai").value;
      const gd = document.getElementById("huongDanCC");
      if(loai === "IELTS") gd.innerText = "Áp dụng toàn bộ ngành trừ TM41. Nhập điểm số (Ví dụ: 6.5)";
      else if(loai === "TOEFL") gd.innerText = "Áp dụng toàn bộ ngành trừ TM41. Nhập tổng điểm (Ví dụ: 78)";
      else if(loai === "VSTEP") gd.innerText = "Áp dụng toàn bộ ngành trừ TM41. Nhập điểm số (Ví dụ: 7.5)";
      else if(loai === "APTIS") gd.innerText = "Áp dụng toàn bộ ngành trừ TM41. Nhập điểm số (Ví dụ: 165)";
      else if(loai === "TOEIC") gd.innerText = "Áp dụng toàn bộ ngành trừ TM41. Nhập điểm số (Ví dụ: 780)";
      else if(loai === "HSK") gd.innerText = "⚠️ CHỈ tính cho ngành Ngôn ngữ TQ (TM40, TM41). Nhập cấp độ HSK (Ví dụ: 5)";
      else if(loai === "TCF") gd.innerText = "⚠️ CHỈ tính cho ngành Tiếng Pháp (TM42). Nhập điểm số (Ví dụ: 400)";
      else if(loai === "DELF") gd.innerText = "⚠️ CHỈ tính cho ngành Tiếng Pháp (TM42). Nhập mã cấp độ (Ví dụ: B2)";
      else gd.innerText = "";
    }

    function doiNhomNganh() {
      const nhom = document.getElementById("selectNhomNganh").value;
      const selectNganh = document.getElementById("selectNganh");
      selectNganh.innerHTML = '<option value="">-- Chọn Ngành --</option>';

      if(nhom && dataTMU[nhom]) {
        for(let ma in dataTMU[nhom]) {
          let option = document.createElement("option");
          option.value = ma;
          option.text = `[${ma}] ${dataTMU[nhom][ma].ten}`;
          selectNganh.appendChild(option);
        }
      } else {
        selectNganh.innerHTML = '<option value="">-- Vui lòng chọn nhóm ngành trước --</option>';
      }
    }

    // SỬA ĐỔI QUAN TRỌNG: Hàm tính điểm khuyến khích cần biết mã ngành đang chọn
    function tinhDiemKhuyenKhich(maNganh) {
      const loai = document.getElementById("ccnnLoai").value;
      const valInput = document.getElementById("ccnnDiem").value.trim();
      const diem = parseFloat(valInput) || 0;

      // Kiểm tra ràng buộc đặc biệt từ bảng dữ liệu của bạn
      if (loai === "HSK" && maNganh !== "TM40" && maNganh !== "TM41") {
        return -1; // Đánh dấu: CCNN này bị từ chối ở ngành này
      }
      if ((loai === "TCF" || loai === "DELF") && maNganh !== "TM42") {
        return -1; // Đánh dấu: CCNN này bị từ chối ở ngành này
      }
      
      // Ngành TM41 chỉ chấp nhận HSK, loại bỏ các chứng chỉ Anh/Pháp khác
      if (maNganh === "TM41" && loai !== "HSK" && loai !== "NONE") {
        return -1;
      }

      // Tiến hành quy đổi điểm bình thường nếu thỏa mãn điều kiện ngành
      if (loai === "IELTS") {
        if (diem >= 7.0) return 1.5;
        if (diem >= 6.5) return 1.25;
        if (diem >= 6.0) return 1.0;
        if (diem >= 5.5) return 0.75;
        if (diem >= 5.0) return 0.5;
      }
      if (loai === "TOEFL") {
        if (diem >= 85) return 1.5;
        if (diem >= 75) return 1.25;
        if (diem >= 65) return 1.0;
        if (diem >= 51) return 0.75;
        if (diem >= 45) return 0.5;
      }
      if (loai === "VSTEP") {
        if (diem >= 8.5) return 1.5;
        if (diem >= 8.0) return 1.25;
        if (diem >= 7.0) return 1.0;
        if (diem >= 6.0) return 0.75;
        if (diem >= 5.5) return 0.5;
      }
      if (loai === "APTIS") {
        if (diem >= 180) return 1.5;
        if (diem >= 170) return 1.25;
        if (diem >= 160) return 1.0;
        if (diem >= 150) return 0.75;
        if (diem >= 140) return 0.5;
      }
      if (loai === "TOEIC") {
        if (diem >= 830) return 1.5;
        if (diem >= 780) return 1.25;
        if (diem >= 680) return 1.0;
        if (diem >= 560) return 0.75;
        if (diem >= 440) return 0.5;
      }
      if (loai === "HSK") {
        if (valInput === "6") return 1.5;
        if (valInput === "5") return 1.25;
        if (valInput === "4") return 1.0;
        if (valInput === "3") return 0.5;
      }
      if (loai === "TCF") {
        if (diem >= 500) return 1.5;
        if (diem >= 450) return 1.25;
        if (diem >= 400) return 1.0;
        if (diem >= 350) return 0.75;
        if (diem >= 300) return 0.5;
      }
      if (loai === "DELF") {
        let textU = valInput.toUpperCase();
        if (textU === "C1" || textU === "C2") return 1.5;
        if (textU === "B2") return 1.25;
        if (textU === "B1") return 0.75;
      }
      return 0;
    }

    function analysisKetQua() {
      const nhom = document.getElementById("selectNhomNganh").value;
      const maNganh = document.getElementById("selectNganh").value;

      if(!nhom || !maNganh) {
        alert("Vui lòng chọn đầy đủ Nhóm ngành và Ngành tra cứu!");
        return;
      }

      const dToan = parseFloat(document.getElementById("diemToan").value);
      const dVan = parseFloat(document.getElementById("diemVan").value);
      const mTc1 = document.getElementById("monTc1").value;
      const dTc1 = parseFloat(document.getElementById("diemTc1").value);
      const mTc2 = document.getElementById("monTc2").value;
      const dTc2 = parseFloat(document.getElementById("diemTc2").value);

      if(isNaN(dToan) || isNaN(dVan) || !mTc1 || isNaN(dTc1) || !mTc2 || isNaN(dTc2)) {
        alert("Vui lòng nhập đầy đủ điểm 4 môn thi THPT!");
        return;
      }
      if(mTc1 === mTc2) {
        alert("Hai môn tự chọn không được trùng nhau!");
        return;
      }

      let diemMon = { "TOAN": dToan, "VAN": dVan };
      diemMon[mTc1] = dTc1;
      diemMon[mTc2] = dTc2;

      const mapTohop = {
        "A00": ["TOAN", "LY", "HOA"],
        "A01": ["TOAN", "LY", "ANH"],
        "B00": ["TOAN", "HOA", "SINH"],
        "C00": ["VAN", "SU", "DIA"],
        "D01": ["TOAN", "VAN", "ANH"],
        "D03": ["TOAN", "VAN", "PHAP"],
        "D04": ["TOAN", "VAN", "TRUNG"],
        "D07": ["TOAN", "HOA", "ANH"],
        "D09": ["TOAN", "SU", "ANH"],
        "D10": ["TOAN", "DIA", "ANH"]
      };

      // Gọi hàm tính điểm và truyền kèm mã ngành hiện tại vào để check điều kiện ràng buộc
      let diemKhuyenKhich = tinhDiemKhuyenKhich(maNganh);
      let canhBaoText = "";

      if (diemKhuyenKhich === -1) {
        diemKhuyenKhich = 0; // Không được cộng điểm khuyến khích
        canhBaoText = `<p style="color:#d9534f; font-weight:bold; margin-bottom:10px;">⚠️ Lưu ý: Chứng chỉ ngoại ngữ bạn chọn không hợp lệ hoặc không áp dụng cho ngành này theo đề án TMU, điểm khuyến khích được tính bằng 0.</p>`;
      }

      const nganhChon = dataTMU[nhom][maNganh];
      let htmlOutput = canhBaoText;
      let coTohopXetTuyen = false;

      nganhChon.khoi.forEach(tenKhoi => {
        let cacMonYeuCau = mapTohop[tenKhoi];
        
        if (cacMonYeuCau && cacMonYeuCau.every(m => diemMon[m] !== undefined)) {
          coTohopXetTuyen = true;
          let diemGoc3Mon = diemMon[cacMonYeuCau[0]] + diemMon[cacMonYeuCau[1]] + diemMon[cacMonYeuCau[2]];
          let diemXetTuyen = diemGoc3Mon + diemKhuyenKhich;
          diemXetTuyen = Math.round(diemXetTuyen * 100) / 100;

          let logicPass = diemXetTuyen >= nganhChon.dc2025;
          let classTrangThai = logicPass ? "pass" : "fail";
          let textTrangThai = logicPass ? "CƠ HỘI ĐỖ CAO 🟢" : "DƯỚI ĐIỂM CHUẨN 🔴";

          htmlOutput += `
            <div class="khoi-item ${classTrangThai}">
              <div class="status-text ${classTrangThai}">Tổ hợp ${tenKhoi}: ${textTrangThai}</div>
              <div class="info-diem">
                Điểm xét của bạn: <b>${diemXetTuyen}</b> điểm 
                (Gốc 3 môn: ${diemGoc3Mon.toFixed(1)} + Khuyến khích CCNN: ${diemKhuyenKhich})<br>
                Điểm chuẩn năm 2025: <b>${nganhChon.dc2025}</b> điểm
              </div>
            </div>`;
        }
      });

      if(!coTohopXetTuyen) {
        htmlOutput += `<p style="color:#666;">Các môn bạn thi không tạo thành tổ hợp xét tuyển phù hợp cho ngành này (Yêu cầu tổ hợp: ${nganhChon.khoi.join(", ")}).</p>`;
      }

      document.getElementById("tieuDeKetQua").innerText = "Kết quả ngành: " + nganhChon.ten;
      document.getElementById("chiTietKetQua").innerHTML = htmlOutput;
      document.getElementById("vungKetQua").style.display = "block";
    }
  </script>
</body>
</html>
