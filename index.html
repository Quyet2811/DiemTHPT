<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Công Cụ Tính Điểm Xét Tuyển THPT</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #f4f6f9;
      padding: 15px;
      margin: 0;
      color: #333;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      max-width: 480px;
      margin: 10px auto;
    }
    h2 { text-align: center; color: #0056b3; margin-bottom: 20px; font-size: 22px; }
    h3 { color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 5px; margin-top: 25px; font-size: 18px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 6px; font-size: 14px; }
    .row-mon {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    select, input {
      width: 100%; padding: 10px;
      border: 1px solid #ccc; border-radius: 6px;
      font-size: 16px; box-sizing: border-box;
    }
    input:focus, select:focus { border-color: #007bff; outline: none; }
    button {
      width: 100%; padding: 12px;
      background-color: #28a745; color: white;
      border: none; border-radius: 6px;
      font-size: 16px; font-weight: bold; cursor: pointer;
      margin-top: 15px;
    }
    button:hover { background-color: #218838; }
    .result-box {
      margin-top: 20px; padding: 15px;
      background: #e9ecef; border-radius: 8px;
      display: none;
    }
    .khoi-item {
      background: white; padding: 10px;
      border-radius: 6px; margin-top: 8px;
      display: flex; justify-content: space-between;
      align-items: center; border-left: 5px solid #007bff;
    }
    .khoi-ten { font-weight: bold; color: #444; }
    .khoi-diem { font-size: 18px; font-weight: bold; color: #dc3545; }
    .link-dean {
      background: #fff; padding: 12px;
      border-radius: 8px; margin-bottom: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      display: flex; justify-content: space-between; align-items: center;
    }
    .link-dean a { color: #007bff; text-decoration: none; font-weight: bold; font-size: 14px; }
  </style>
</head>
<body>

  <div class="container">
    <h2>Tính Điểm Tổ Hợp THPT</h2>
    
    <div class="form-group">
      <label>1. Nhập điểm 2 môn bắt buộc:</label>
      <div class="row-mon">
        <input type="text" value="Toán" disabled style="background:#e9ecef; font-weight:bold;">
        <input type="number" id="diemToan" placeholder="Điểm Toán" step="0.1" min="0" max="10">
      </div>
      <div class="row-mon">
        <input type="text" value="Ngữ Văn" disabled style="background:#e9ecef; font-weight:bold;">
        <input type="number" id="diemVan" placeholder="Điểm Văn" step="0.1" min="0" max="10">
      </div>
    </div>

    <div class="form-group">
      <label>2. Chọn và nhập môn tự chọn 1:</label>
      <div class="row-mon">
        <select id="monTc1">
          <option value="">-- Chọn môn --</option>
          <option value="Ly">Vật Lí</option>
          <option value="Hoa">Hóa Học</option>
          <option value="Sinh">Sinh Học</option>
          <option value="Su">Lịch Sử</option>
          <option value="Dia">Địa Lí</option>
          <option value="Gdcd">GDCD</option>
          <option value="Anh">Tiếng Anh</option>
          <option value="Tin">Tin Học</option>
          <option value="Cn">Công Nghệ</option>
        </select>
        <input type="number" id="diemTc1" placeholder="Điểm" step="0.1" min="0" max="10">
      </div>
    </div>

    <div class="form-group">
      <label>3. Chọn và nhập môn tự chọn 2:</label>
      <div class="row-mon">
        <select id="monTc2">
          <option value="">-- Chọn môn --</option>
          <option value="Ly">Vật Lí</option>
          <option value="Hoa">Hóa Học</option>
          <option value="Sinh">Sinh Học</option>
          <option value="Su">Lịch Sử</option>
          <option value="Dia">Địa Lí</option>
          <option value="Gdcd">GDCD</option>
          <option value="Anh">Tiếng Anh</option>
          <option value="Tin">Tin Học</option>
          <option value="Cn">Công Nghệ</option>
        </select>
        <input type="number" id="diemTc2" placeholder="Điểm" step="0.1" min="0" max="10">
      </div>
    </div>

    <button onclick="tinhToanKhoiThi()">Tính Điểm Các Khối</button>

    <div class="result-box" id="vungKetQua">
      <h4 style="margin: 0 0 10px 0; color: #555;">Các tổ hợp bạn có thể xét tuyển:</h4>
      <div id="danhSachKhoi"></div>
    </div>

    <h3>🔗 Đề Án Tuyển Sinh Các Trường</h3>
    
    <div class="link-dean">
      <span>Đại học Bách Khoa Hà Nội</span>
      <a href="https://ts.hust.edu.vn/" target="_blank">Xem Đề Án ➔</a>
    </div>
    
    <div class="link-dean">
      <span>Đại học Kinh tế Quốc dân</span>
      <a href="https://neu.edu.vn/" target="_blank">Xem Đề Án ➔</a>
    </div>

    <div class="link-dean">
      <span>Đại học Ngoại thương</span>
      <a href="https://tuyensinh.ftu.edu.vn/" target="_blank">Xem Đề Án ➔</a>
    </div>

  </div>

  <script>
    function tinhToanKhoiThi() {
      // Lấy điểm môn bắt buộc
      const dToan = parseFloat(document.getElementById("diemToan").value);
      const dVan = parseFloat(document.getElementById("diemVan").value);
      
      // Lấy thông tin môn tự chọn
      const mTc1 = document.getElementById("monTc1").value;
      const dTc1 = parseFloat(document.getElementById("diemTc1").value);
      const mTc2 = document.getElementById("monTc2").value;
      const dTc2 = parseFloat(document.getElementById("diemTc2").value);

      // Kiểm tra xem đã nhập đủ điểm chưa
      if (isNaN(dToan) || isNaN(dVan) || !mTc1 || isNaN(dTc1) || !mTc2 || isNaN(dTc2)) {
        alert("Vui lòng nhập đầy đủ điểm và chọn đủ các môn thi!");
        return;
      }

      if (mTc1 === mTc2) {
        alert("Hai môn tự chọn không được trùng nhau!");
        return;
      }

      // Tạo một đối tượng lưu trữ tất cả điểm để dễ truy xuất
      // Ví dụ: diemSo["Toán"] = 8.5
      let diemSo = { "Toan": dToan, "Van": dVan };
      diemSo[mTc1] = dTc1;
      diemSo[mTc2] = dTc2;

      // Định nghĩa các khối thi phổ biến
      const danhSachKhoiGoc = {
        "A00": ["Toan", "Ly", "Hoa"],
        "A01": ["Toan", "Ly", "Anh"],
        "B00": ["Toan", "Hoa", "Sinh"],
        "C00": ["Van", "Su", "Dia"],
        "D01": ["Toan", "Van", "Anh"],
        "A07": ["Toan", "Su", "Dia"],
        "D07": ["Toan", "Hoa", "Anh"],
        "C01": ["Toan", "Van", "Ly"]
      };

      let htmlOutput = "";

      // Quét qua các khối xem học sinh có đủ 3 môn của khối đó không
      for (let tenKhoi in danhSachKhoiGoc) {
        let monTrongKhoi = danhSachKhoiGoc[tenKhoi]; // Ví dụ: ["Toan", "Ly", "Hoa"]
        
        // Kiểm tra xem người dùng có thi đầy đủ cả 3 môn trong khối này không
        if (monTrongKhoi.every(mon => diemSo[mon] !== undefined)) {
          let tongDiem = diemSo[monTrongKhoi[0]] + diemSo[monTrongKhoi[1]] + diemSo[monTrongKhoi[2]];
          tongDiem = Math.round(tongDiem * 100) / 100; // Làm tròn 2 chữ số thập phân
          
          htmlOutput += `
            <div class="khoi-item">
              <span class="khoi-ten">Khối ${tenKhoi}</span>
              <span class="khoi-diem">${tongDiem} điểm</span>
            </div>`;
        }
      }

      // Nếu không khớp được khối nào trong danh sách phổ biến trên
      if (htmlOutput === "") {
        let tong4Mon = dToan + dVan + dTc1 + dTc2;
        htmlOutput = `<p style="color:#666;">Các môn bạn chọn thuộc tổ hợp mới. Tổng điểm 4 môn của bạn là: <b>${tong4Mon}</b></p>`;
      }

      document.getElementById("danhSachKhoi").innerHTML = htmlOutput;
      document.getElementById("vungKetQua").style.display = "block";
    }
  </script>
</body>
</html>
